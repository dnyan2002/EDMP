{% extends "base.html" %}

{% block title %}Create New User{% endblock %}

{% block styles %}
<style>
body {
    font-family: Arial, sans-serif;
    padding-bottom: 60px;
    margin: 0;
    background-color: #f8f9fa;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Form Container */
.user-form {
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    margin: 20px auto;
    padding: 30px;
    border: 1px solid #ccc;
    background-color: #f5f5f5;
    border-radius: 10px;
    max-width: 800px;
}

/* Form Header */
.form-header {
    width: 100%;
    margin-bottom: 20px;
    text-align: center;
}

.form-header h2 {
    color: #062A63;
    margin: 0;
    padding-bottom: 10px;
    border-bottom: 2px solid #062A63;
    display: inline-block;
}

/* Form Fields */
.form-group {
    flex: 1;
    margin: 0 10px 15px 10px;
    min-width: 250px;
}

.form-group label {
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
    color: #333;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #062A63;
    box-shadow: 0 0 5px rgba(6, 42, 99, 0.3);
}

/* Button Group */
.button-group {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    width: 100%;
}

/* Button Styles */
.submit-button,
.reset-button {
    background-color: #062A63;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.3s ease;
    min-width: 120px;
}

.reset-button {
    background-color: #6c757d;
}

.submit-button:hover {
    background-color: #045191;
}

.reset-button:hover {
    background-color: #5a6268;
}

/* Password Validation */
.password-requirements {
    font-size: 12px;
    color: #666;
    margin-top: 5px;
}

.password-strength {
    height: 5px;
    margin-top: 5px;
    border-radius: 2px;
    background-color: #ddd;
}

.password-strength-meter {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease, background-color 0.3s ease;
}

/* Required Field Indicator */
.required::after {
    content: "*";
    color: red;
    margin-left: 3px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
    .form-group {
        flex: 100%;
        margin: 10px 0;
    }
}
</style>
{% endblock %}
{% block content %}
<div class="container">
    <form class="user-form" id="userCreationForm">
        <div class="form-header">
            <h2>Create New User</h2>
        </div>

        <!-- Full Name Field -->
        <div class="form-group">
            <label for="fullName" class="required">Full Name</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Enter full name">
        </div>

        <!-- Username Field -->
        <div class="form-group">
            <label for="username" class="required">Username</label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>

        <!-- Password Field -->
        <div class="form-group">
            <label for="password" class="required">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
            <div class="password-strength">
                <div class="password-strength-meter" id="passwordStrength"></div>
            </div>
            <div class="password-requirements">
                Password must be at least 8 characters and include a number, a capital letter, and a special character.
            </div>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group">
            <label for="confirmPassword" class="required">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
        </div>

        <!-- Company Name Field -->
        <div class="form-group">
            <label for="companyName" class="required">Company Name</label>
            <input type="text" id="companyName" name="companyName" required placeholder="Enter company name">
        </div>

        <!-- Role Selection Field -->
        <div class="form-group">
            <label for="role" class="required">Role</label>
            <select id="role" name="role" required>
                <option value="">Select a Role</option>
                <option value="admin">Administrator</option>
                <option value="manager">Manager</option>
                <option value="supervisor">Supervisor</option>
                <option value="operator">Operator</option>
                <option value="viewer">Viewer</option>
            </select>
        </div>

        <!-- Button Group -->
        <div class="button-group">
            <button type="submit" class="submit-button"><i class="fas fa-user-plus"></i> Create User</button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrength = document.getElementById('passwordStrength');
        const form = document.getElementById('userCreationForm');

        // Password strength meter
        passwordInput.addEventListener('input', function() {
            const password = passwordInput.value;
            let strength = 0;
            let color = '#ddd';

            if (password.length >= 8) strength += 25;
            if (password.match(/[A-Z]/)) strength += 25;
            if (password.match(/[0-9]/)) strength += 25;
            if (password.match(/[^A-Za-z0-9]/)) strength += 25;

            passwordStrength.style.width = strength + '%';

            if (strength <= 25) {
                color = '#dc3545'; // Red
            } else if (strength <= 50) {
                color = '#ffc107'; // Yellow
            } else if (strength <= 75) {
                color = '#fd7e14'; // Orange
            } else {
                color = '#28a745'; // Green
            }

            passwordStrength.style.backgroundColor = color;
        });

        // Form submission validation
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Check if passwords match
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // Validate password strength
            if (password.length < 8 || !password.match(/[A-Z]/) || 
                !password.match(/[0-9]/) || !password.match(/[^A-Za-z0-9]/)) {
                alert("Password doesn't meet the requirements!");
                return;
            }

            // If validation passes, you would normally submit the form
            alert("User creation form submitted successfully!");
            // form.submit(); // Uncomment this in actual implementation
        });
    });
</script>
{% endblock %}
